<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeautyFlow — Gestão de Estética</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3D;
            --primary-light: #E5D5A4;
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --sidebar-bg: #FFFFFF;
            --text: #2D2D2D;
            --text-light: #7A7A7A;
            --border: #EEEEEE;
            --success: #43A047;
            --danger: #D32F2F;
            --warning: #FFA000;
            --pastel-blue: #E3F2FD;
            --pastel-pink: #FCE4EC;
            --pastel-green: #E8F5E9;
            --pastel-orange: #FFF3E0;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.03);
            --transition: all 0.3s ease;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.01em;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            height: 100vh;
        }

        /* Layout */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: var(--sidebar-bg);
            color: var(--primary);
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        /* Sidebar Luxury */
        aside {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            transition: var(--transition);
            z-index: 2000;
            height: 100vh;
        }

        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1500;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 26px;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
            text-transform: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #666666;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .nav-item:hover {
            color: var(--primary);
            background: #F9F9F9;
        }

        .nav-item.active {
            background: rgba(201, 168, 76, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 48px;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Topbar Clean */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #F5F5F5;
            padding: 10px 16px;
            border-radius: 12px;
            width: 300px;
            gap: 10px;
            color: var(--text-light);
        }
        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .qa-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            color: var(--text);
            text-align: left;
        }
        .qa-btn:hover { transform: translateY(-3px); }
        .qa-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: white;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--sidebar-bg);
            letter-spacing: -0.5px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        /* Components Luxury */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: none;
            border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
        }
        .card:hover { transform: translateY(-4px); }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; 
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4); }
        
        .btn-outline { 
            background: transparent; 
            border: 2px solid var(--primary); 
            color: var(--primary); 
        }
        .btn-outline:hover { background: rgba(201, 168, 76, 0.05); }

        .btn-ghost { background: transparent; color: var(--text-light); }
        .btn-ghost:hover { background: rgba(0,0,0,0.05); }

        /* Stats Luxury */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 4px solid var(--primary);
        }

        .stat-value { font-size: 28px; font-weight: 700; color: var(--sidebar-bg); }
        .stat-label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .stat-icon { color: var(--primary); margin-bottom: 12px; width: 24px; height: 24px; }

        /* Data Items Luxury */
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #F0E6D2, #E5D5A4);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            margin-right: 18px;
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .badge {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-pending { background: #FFF9C4; color: #827717; }
        .badge-confirmed { background: #E3F2FD; color: #1565C0; }
        .badge-done { background: #E8F5E9; color: #2E7D32; }
        .badge-cancelled { background: #FFEBEE; color: #C62828; }

        /* Agenda Grid Luxury */
        .calendar-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .agenda-grid {
            display: grid;
            grid-template-columns: 100px 1fr;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .time-col {
            background: #FDFBF7;
            border-right: 1px solid rgba(0,0,0,0.03);
        }

        .time-slot {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .grid-row {
            height: 70px;
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }

        .appointment-block {
            position: absolute;
            left: 10px;
            right: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(201, 168, 76, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dashboard-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
        }

        /* Table/List Styles */
        .data-list { width: 100%; border-collapse: collapse; }
        .data-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
        }
        .data-item:last-child { border-bottom: none; }
        .data-item:hover { background: rgba(201, 168, 76, 0.02); }

        .item-info { flex: 1; }
        .item-title { font-weight: 700; font-size: 16px; color: var(--sidebar-bg); margin-bottom: 4px; }
        .item-subtitle { color: var(--text-light); font-size: 14px; font-weight: 500; }

        /* Modal Overlay Luxury */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            transition: var(--transition);
        }

        .modal-overlay.active { display: flex; opacity: 1; }

        .modal {
            background: white;
            width: 95%;
            max-width: 550px;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            position: relative;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .modal-overlay.active .modal { transform: translateY(0); }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #FDFBF7;
            font-size: 15px;
            transition: var(--transition);
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.1); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(212, 116, 138, 0.4);
            cursor: pointer;
            z-index: 50;
            border: none;
        }

        /* Client View (Self-Registration) */
        #client-view {
            display: none;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
        }

        .step-card {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .step-dot { width: 8px; height: 8px; border-radius: 4px; background: #EEE; }
        .step-dot.active { width: 24px; background: var(--primary); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }

        /* Responsive Global Fix */
        @media (max-width: 992px) {
            aside {
                position: fixed;
                left: -280px;
                top: 0; bottom: 0;
                height: 100vh;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            }
            aside.active { left: 0; }
            .mobile-header { display: flex; }
            
            main { padding: 90px 15px 30px 15px !important; width: 100vw; }
            
            /* Forçar coluna única em TUDO no mobile */
            .stats-grid, 
            .dashboard-content, 
            .form-row, 
            .choice-grid,
            .config-grid,
            .finance-grid { 
                grid-template-columns: 1fr !important; 
                gap: 15px !important; 
            }

            header { 
                flex-direction: column !important; 
                align-items: flex-start !important; 
                gap: 15px !important; 
                margin-bottom: 25px !important;
            }
            
            header h1 { font-size: 24px !important; }
            header .btn { width: 100% !important; justify-content: center !important; }

            .card { padding: 15px !important; width: 100% !important; margin-bottom: 15px !important; }
            
            /* Ajuste da Agenda Diária no Mobile */
            .calendar-container { padding: 10px !important; }
            .appointment-block { font-size: 11px !important; padding: 5px !important; }
            
            /* Ajuste do Estoque */
            .stock-item { flex-direction: column !important; gap: 15px !important; }
            .stock-item .btn-group { width: 100% !important; }
            .stock-item .btn { flex: 1 !important; }
        }

        /* Stock Progress Bar */
        .stock-bar-bg { height: 8px; background: #EEE; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .stock-bar-fill { height: 100%; border-radius: 4px; transition: var(--transition); }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .choice-item {
            padding: 12px;
            border: 1px solid #EEE;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }
        .choice-item.selected { border-color: var(--primary); background: rgba(212, 116, 138, 0.05); color: var(--primary); }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="mobile-header">
        <div class="logo" style="margin:0">BeautyFlow</div>
        <button class="btn btn-ghost" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
    </div>

    <!-- Main App Container -->
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="sparkles"></i></div>
                <span id="sidebar-studio-name">BeautyFlow</span>
            </div>
            <nav>
                <div class="nav-item active" onclick="showView('dashboard')"><i data-lucide="layout-dashboard"></i><span>Visão Geral</span></div>
                <div class="nav-item" onclick="showView('agenda')"><i data-lucide="calendar"></i><span>Agenda</span></div>
                
                <div style="margin: 15px 0 5px 20px; font-size: 11px; text-transform: uppercase; color: #BBB; font-weight: 700; letter-spacing: 1px;">Gestão</div>
                <div class="nav-item" onclick="showView('clientes')"><i data-lucide="users"></i><span>Meus Clientes</span></div>
                <div class="nav-item" onclick="showView('servicos')"><i data-lucide="scissors"></i><span>Procedimentos</span></div>
                <div class="nav-item" onclick="showView('estoque')"><i data-lucide="package"></i><span>Estoque & Materiais</span></div>
                
                <div style="margin: 15px 0 5px 20px; font-size: 11px; text-transform: uppercase; color: #BBB; font-weight: 700; letter-spacing: 1px;">Financeiro</div>
                <div class="nav-item" onclick="showView('caixa')"><i data-lucide="wallet"></i><span>Fluxo de Caixa</span></div>
                <div class="nav-item" onclick="openModal('nova-transacao')"><i data-lucide="shopping-bag"></i><span>Lançar Venda</span></div>
                <div class="nav-item" onclick="gerarRelatorioMes()"><i data-lucide="pie-chart"></i><span>Relatórios</span></div>
                
                <div style="margin: 15px 0 5px 20px; font-size: 11px; text-transform: uppercase; color: #BBB; font-weight: 700; letter-spacing: 1px;">Negócio</div>
                <div class="nav-item" onclick="showView('config')"><i data-lucide="building-2"></i><span>Minha Clínica</span></div>
                <div class="nav-item" onclick="toast('Módulo Marketing em breve')"><i data-lucide="megaphone"></i><span>Marketing</span></div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected here via JS -->
        </main>
    </div>

    <!-- Client Self-Registration View -->
    <div id="client-view">
        <div id="client-steps-container"></div>
    </div>

    <!-- Global Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal-content" onclick="event.stopPropagation()">
            <!-- Modal content injected here -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Operação realizada!</div>

        // --- DATA STATE ---
        let state = {

                ];
                state.servicos = [

                ];
                state.profissionais = [
                    { id: 'p1', nome: 'Fernanda' },

                ];
                state.agendamentos = [

            });

            const main = document.getElementById('main-content');
            
            if (viewName === 'dashboard') renderDashboard(main);
            else if (viewName === 'agenda') renderAgenda(main);
            else if (viewName === 'agenda-semanal') renderAgendaSemanal(main);
            else if (viewName === 'clientes') renderClientes(main);
            else if (viewName === 'servicos') renderServicos(main);
            else if (viewName === 'caixa') renderCaixa(main);
            else if (viewName === 'estoque') renderEstoque(main);
            else if (viewName === 'config') renderConfig(main);

        function renderAgenda(container) {

            container.innerHTML = `
                <header>
                    <h1>Agenda Diária</h1>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-outline" onclick="showView('agenda-semanal')"><i data-lucide="columns"></i> Semanal</button>

                    </div>
                </header>

                <div class="calendar-container">
                    <div class="calendar-header">
                        <button class="btn btn-ghost" onclick="mudarData(-1)"><i data-lucide="chevron-left"></i></button>
                        <span style="font-weight: 700;">${agendaData.toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'})}</span>
                        <button class="btn btn-ghost" onclick="mudarData(1)"><i data-lucide="chevron-right"></i></button>
                    </div>

                    <div class="agenda-grid">
                        <div class="time-col">
                            ${Array.from({length: 13}, (_, i) => `<div class="time-slot">${(i + 8).toString().padStart(2, '0')}:00</div>`).join('')}
                        </div>
                        <div class="grid-col" id="agenda-slots" style="position: relative;">
                            ${Array.from({length: 12}, (_, i) => `<div class="grid-row" onclick="openModal('novo-agendamento', {hora: '${(i+8).toString().padStart(2, '0')}:00'})"></div>`).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Render blocks
            const slots = document.getElementById('agenda-slots');
            state.agendamentos.filter(a => a.data === dataStr).forEach(a => {
                const hour = parseInt(a.hora.split(':')[0]);
                const min = parseInt(a.hora.split(':')[1]);
                const top = ((hour - 8) * 60) + min;
                const s = state.servicos.find(ser => ser.id === a.servicoId);
                const c = state.clientes.find(cli => cli.id === a.clienteId);
                const duracao = s ? s.duracao : 30;

                const block = document.createElement('div');
                block.className = 'appointment-block';
                block.style.top = top + 'px';
                block.style.height = duracao + 'px';
                block.innerHTML = `<strong>${a.hora}</strong> ${c ? c.nome : 'Cli'} - ${s ? s.nome : 'Srv'}`;
                block.onclick = (e) => { e.stopPropagation(); openModal('detalhe-agendamento', a); };
                slots.appendChild(block);
            });
            lucide.createIcons();
        }

        function toggleClientTab(tab, id) {
            const c = state.clientes.find(cli => cli.id === id);
            const atendimentos = state.agendamentos.filter(a => a.clienteId === c.id && a.status === 'realizado').sort((a,b) => new Date(b.data) - new Date(a.data));
            const container = document.getElementById('perfil-tab-content');
            const tabResumo = document.getElementById('tab-resumo');
            const tabFotos = document.getElementById('tab-fotos');

            if (tab === 'fotos') {
                tabResumo.style.color = 'var(--text-light)';
                tabResumo.style.borderBottom = 'none';
                tabFotos.style.color = 'var(--primary)';
                tabFotos.style.borderBottom = '2px solid var(--primary)';

                container.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        ${atendimentos.map(a => {
                            const s = state.servicos.find(ser => ser.id === a.servicoId);
                            const fotos = a.fotos || [];
                            return `
                                <div class="card" style="background: white; padding: 15px; border: 1px solid #EEE; box-shadow: none;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                        <div>
                                            <div style="font-weight: 700; font-size: 14px;">${s ? s.nome : ''}</div>
                                            <div style="font-size: 12px; color: var(--text-light)">${new Date(a.data).toLocaleDateString()}</div>
                                        </div>
                                        <button class="btn btn-ghost" style="padding: 5px 10px; font-size: 10px; color: var(--primary)" onclick="document.getElementById('upload-${a.id}').click()">
                                            <i data-lucide="plus"></i> Foto
                                        </button>
                                        <input type="file" id="upload-${a.id}" style="display: none" accept="image/*" onchange="uploadFotoAtendimento('${a.id}', '${c.id}')">
                                    </div>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                                        ${fotos.map(f => `
                                            <div style="border-radius: 8px; overflow: hidden; height: 80px; border: 1px solid #F0F0F0">
                                                <img src="${f}" style="width: 100%; height: 100%; object-fit: cover;">
                                            </div>
                                        `).join('')}
                                        ${fotos.length === 0 ? '<p style="grid-column: span 3; font-size: 11px; color: #BBB; text-align: center; padding: 10px;">Sem fotos nesta sessão.</p>' : ''}
                                    </div>
                                </div>
                            `;
                        }).join('') || '<p style="text-align: center; color: #999; padding: 20px;">Finalize um atendimento para anexar fotos.</p>'}
                    </div>
                `;
                lucide.createIcons();
            } else {
                showView('clientes');
                openModal('perfil-cliente', id);
            }
        }

        function uploadFotoAtendimento(agId, cliId) {
            const file = document.getElementById(`upload-${agId}`).files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const a = state.agendamentos.find(item => item.id === agId);
                if (!a.fotos) a.fotos = [];
                a.fotos.push(e.target.result);
                save();
                toggleClientTab('fotos', cliId);
                toast('Foto anexada à sessão!');
            };
            reader.readAsDataURL(file);
        }

        // --- ACTIONS ---
        function saveNovoCliente() {
            const nome = document.getElementById('new-cli-nome').value;
            const tel = document.getElementById('new-cli-tel').value;
            const nasc = document.getElementById('new-cli-nasc').value;
            const insta = document.getElementById('new-cli-insta').value;

            if (!nome || !tel) return alert('Preencha nome e WhatsApp!');
            
            const novo = {
                id: 'c' + Date.now(),
                nome: nome,
                whatsapp: tel.replace(/\D/g, ''),
                nascimento: nasc,
                insta: insta,
                fichaCompleta: false,
                ultimaVisita: new Date().toISOString().split('T')[0],
                totalVisitas: 0,
                pontos: 0,
                fotos: [],
                linkId: Math.random().toString(36).substr(2, 6)
            };
            state.clientes.push(novo);
            save();
            closeModal();
            showView('clientes');
            toast('Cliente cadastrado!');
        }

        function saveNovoServico() {
            const nome = document.getElementById('new-srv-nome').value;
            const dur = document.getElementById('new-srv-dur').value;
            const preco = document.getElementById('new-srv-preco').value;
            const custo = document.getElementById('new-srv-custo').value || 0;
            const pts = document.getElementById('new-srv-pts').value || 0;

            if (!nome || !dur || !preco) return alert('Preencha todos os campos!');

            const novo = {
                id: 's' + Date.now(),
                nome: nome,
                duracao: parseInt(dur),
                preco: parseFloat(preco),
                custo: parseFloat(custo),
                pontos: parseInt(pts)
            };
            state.servicos.push(novo);
            save();
            closeModal();
            showView('servicos');
            toast('Serviço adicionado!');
        }

        function excluirServico(id) {
            if (!confirm('Tem certeza que deseja excluir este serviço?')) return;
            state.servicos = state.servicos.filter(s => s.id !== id);
            save();
            showView('servicos');
            toast('Serviço removido!');
        }

        function salvarConfigGeral() {
            state.config.nomeClinica = document.getElementById('cfg-nome').value;
            state.config.whatsapp = document.getElementById('cfg-whats').value;
            save();
            updateSidebarLogo();
            toast('Configurações salvas!');
        }

        function updateSidebarLogo() {
            const el = document.getElementById('sidebar-studio-name');
            if (el) el.innerText = state.config.nomeClinica || 'BeautyFlow';
            
            const mobEl = document.querySelector('.mobile-header .logo');
            if (mobEl) mobEl.innerText = state.config.nomeClinica || 'BeautyFlow';
        }

        function saveNovoAgendamento() {
            const cliId = document.getElementById('new-age-cli').value;
            const srvId = document.getElementById('new-age-srv').value;
            const hora = document.getElementById('new-age-hora').value;
            const data = document.getElementById('new-age-data').value;

            const novo = {
                id: 'a' + Date.now(),
                clienteId: cliId,
                servicoId: srvId,
                hora: hora,
                data: data,
                status: 'pendente',
                profissionalId: 'p1'
            };
            state.agendamentos.push(novo);
            save();
            closeModal();
            showView('agenda');
            toast('Agendamento criado!');
        }

        function saveNovaTransacao() {
            const desc = document.getElementById('new-tr-desc').value;
            const valor = document.getElementById('new-tr-valor').value;
            const data = document.getElementById('new-tr-data').value;

            if (!desc || !valor) return alert('Preencha todos os campos!');

            state.transacoes.push({
                id: 't' + Date.now(),
                tipo: 'saida',
                valor: parseFloat(valor),
                desc: desc,
                data: data,
                fpag: 'Dinheiro'
            });
            save();
            closeModal();
            showView('caixa');
            toast('Saída lançada com sucesso!');
        }

        function saveNovoProduto() {
            const nome = document.getElementById('new-pr-nome').value;
            const qtd = document.getElementById('new-pr-qtd').value;
            const min = document.getElementById('new-pr-min').value;

            if (!nome) return alert('Preencha o nome do produto!');

            state.produtos.push({
                id: 'pr' + Date.now(),
                nome: nome,
                qtd: parseInt(qtd),
                min: parseInt(min),
                un: 'un',
                cat: 'Diversos'
            });
            save();
            closeModal();
            showView('estoque');
            toast('Produto cadastrado!');
        }

        function darBaixaEstoque(id) {
            const p = state.produtos.find(item => item.id === id);
            if (p && p.qtd > 0) {
                p.qtd--;
                save();
                showView('estoque');
                toast('Baixa realizada!');
            } else {
                toast('Estoque zerado!');
            }
        }

        function reporEstoque(id) {
            const p = state.produtos.find(item => item.id === id);
            if (p) {
                p.qtd++;
                save();
                showView('estoque');
                toast('Estoque reposto!');
            }
        }

        function marcarComoRealizado(id) {
            const a = state.agendamentos.find(item => item.id === id);
            const s = state.servicos.find(ser => ser.id === a.servicoId);
            const c = state.clientes.find(cli => cli.id === a.clienteId);
            
            a.status = 'realizado';
            c.ultimaVisita = a.data;
            c.totalVisitas++;
            
            // Fidelidade
            if (s && s.pontos) {
                c.pontos = (c.pontos || 0) + s.pontos;
            }

            // Lançar no caixa
            state.transacoes.push({
                id: 't' + Date.now(),
                tipo: 'entrada',
                valor: s ? s.preco : 0,
                desc: `${s ? s.nome : 'Serviço'} - ${c.nome}`,
                data: a.data,
                fpag: 'Pix'
            });

            save();

            // Opção de Avaliação
            const estrelas = prompt("Finalizado! Avaliação da cliente (1-5 estrelas):", "5");
            if (estrelas) {
                state.avaliacoes.push({
                    id: 'v' + Date.now(),
                    clienteId: c.id,
                    profissionalId: a.profissionalId,
                    estrelas: parseInt(estrelas),
                    data: new Date().toISOString()
                });
                save();
            }

            closeModal();
            showView('dashboard');
            toast('Atendimento finalizado com sucesso!');

            if (confirm("Deseja enviar a mensagem de agradecimento com link de avaliação?")) {
                enviarWhats(c.whatsapp, 'avaliacao', { nome: c.nome });
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function salvarTemplates() {
            Object.keys(state.config.templates).forEach(key => {
                const el = document.getElementById(`tpl-${key}`);
                if (el) state.config.templates[key] = el.value;
            });
            save();
            toast('Templates salvos!');
        }

        function gerarRelatorioMes() {
            const hoje = new Date();
            const mesAtual = hoje.getMonth();
            const anoAtual = hoje.getFullYear();

            const transMes = state.transacoes.filter(t => {
                const d = new Date(t.data);
                return d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
            });

            const receita = transMes.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const atendimentos = state.agendamentos.filter(a => {
                const d = new Date(a.data);
                return d.getMonth() === mesAtual && d.getFullYear() === anoAtual && a.status === 'realizado';
            });

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Relatório Mensal - BeautyFlow</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; color: #1A1A1A; }
                        .header { border-bottom: 2px solid #C9A84C; padding-bottom: 20px; margin-bottom: 40px; }
                        h1 { color: #C9A84C; font-family: 'Playfair Display', serif; }
                        .stat-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
                        .stat { padding: 20px; background: #FDFBF7; border-radius: 12px; }
                        .stat-val { font-size: 24px; font-weight: 700; color: #C9A84C; }
                        .footer { margin-top: 60px; font-size: 12px; color: #7A7A7A; border-top: 1px solid #EEE; padding-top: 20px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>Relatório Financeiro Mensal</h1>
                        <p>${state.config.nomeClinica}</p>
                    </div>
                    <div class="stat-box">
                        <div class="stat">
                            <div>Total de Atendimentos</div>
                            <div class="stat-val">${atendimentos.length}</div>
                        </div>
                        <div class="stat">
                            <div>Receita Bruta</div>
                            <div class="stat-val">R$ ${receita.toFixed(2)}</div>
                        </div>
                        <div class="stat">
                            <div>Ticket Médio</div>
                            <div class="stat-val">R$ ${atendimentos.length ? (receita / atendimentos.length).toFixed(2) : '0.00'}</div>
                        </div>
                    </div>
                    <div class="footer">Gerado automaticamente por BeautyFlow em ${new Date().toLocaleString()}</div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        function copiarLinkPortal(id) {
            const copyText = document.getElementById(`portal-link-${id}`);
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            toast('Link copiado para a área de transferência!');
        }

        function enviarWhats(tel, templateKey, data = {}) {
            let msg = state.config.templates[templateKey] || "";
            msg = msg.replace(/\[nome\]/g, data.nome || "");
            msg = msg.replace(/\[dia\]/g, data.dia || "hoje");
            msg = msg.replace(/\[hora\]/g, data.hora || "");
            msg = msg.replace(/\[servico\]/g, data.servico || "");
            
            // Gerar link correto
            const base = window.location.href.split('#')[0];
            const finalLink = `${base}#ficha?id=${data.linkId || 'feedback'}`;
            msg = msg.replace(/\[link\]/g, finalLink);
            
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- CLIENT FLOW (PORTAL) ---
        function checkClientRoute() {
            if (window.location.hash.startsWith('#ficha')) {
                document.getElementById('app').style.display = 'none';
                document.getElementById('client-view').style.display = 'block';
                
                const urlParams = new URLSearchParams(window.location.hash.split('?')[1]);
                const id = urlParams.get('id');
                const c = state.clientes.find(cli => cli.linkId === id);

                if (c) {
                    if (c.fichaCompleta) {
                        renderPortalCliente(c);
                    } else {
                        renderFichaStep(1, c);
                    }
                } else {
                    document.getElementById('client-steps-container').innerHTML = '<h2>Link Inválido</h2>';
                }
            }
        }

        function renderPortalCliente(c, activeTab = 'resumo') {
            const container = document.getElementById('client-steps-container');
            const atendimentos = state.agendamentos.filter(a => a.clienteId === c.id && a.status === 'realizado').sort((a,b) => new Date(b.data) - new Date(a.data));
            
            container.innerHTML = `
                <div class="step-card" style="max-width: 500px; text-align: left; padding: 0; overflow: hidden; border-radius: 30px;">
                    <!-- Header Portal -->
                    <div style="background: var(--sidebar-bg); padding: 40px 30px; color: white;">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                            <div class="avatar" style="margin:0; border: 2px solid var(--primary);">${c.nome[0]}</div>
                            <div>
                                <h2 style="margin:0; color: var(--primary);">Olá, ${c.nome.split(' ')[0]}!</h2>
                                <p style="font-size: 13px; opacity: 0.7;">Seu espaço exclusivo BeautyFlow</p>
                            </div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                            <span style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Fidelidade Acumulada</span>
                            <div style="font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 5px;">${c.pontos || 0} <span style="font-size: 14px; font-weight: 400;">pontos</span></div>
                        </div>
                    </div>

                    <!-- Tabs Nav -->
                    <div style="display: flex; background: white; border-bottom: 1px solid #EEE; overflow-x: auto;">
                        <div onclick="renderPortalCliente(state.clientes.find(cli => cli.id === '${c.id}'), 'resumo')" style="flex: 1; min-width: 80px; padding: 15px; text-align: center; font-size: 12px; font-weight: 600; cursor:pointer; color: ${activeTab === 'resumo' ? 'var(--primary)' : '#999'}; border-bottom: 3px solid ${activeTab === 'resumo' ? 'var(--primary)' : 'transparent'}">Resumo</div>
                        <div onclick="renderPortalCliente(state.clientes.find(cli => cli.id === '${c.id}'), 'agendar')" style="flex: 1; min-width: 80px; padding: 15px; text-align: center; font-size: 12px; font-weight: 600; cursor:pointer; color: ${activeTab === 'agendar' ? 'var(--primary)' : '#999'}; border-bottom: 3px solid ${activeTab === 'agendar' ? 'var(--primary)' : 'transparent'}">Agendar</div>
                        <div onclick="renderPortalCliente(state.clientes.find(cli => cli.id === '${c.id}'), 'historico')" style="flex: 1; min-width: 80px; padding: 15px; text-align: center; font-size: 12px; font-weight: 600; cursor:pointer; color: ${activeTab === 'historico' ? 'var(--primary)' : '#999'}; border-bottom: 3px solid ${activeTab === 'historico' ? 'var(--primary)' : 'transparent'}">Histórico</div>
                        <div onclick="renderPortalCliente(state.clientes.find(cli => cli.id === '${c.id}'), 'galeria')" style="flex: 1; min-width: 80px; padding: 15px; text-align: center; font-size: 12px; font-weight: 600; cursor:pointer; color: ${activeTab === 'galeria' ? 'var(--primary)' : '#999'}; border-bottom: 3px solid ${activeTab === 'galeria' ? 'var(--primary)' : 'transparent'}">Galeria</div>
                    </div>

                    <!-- Tab Content -->
                    <div style="padding: 30px; min-height: 350px; background: #FDFBF7;">
                        ${activeTab === 'resumo' ? `
                            <h3 style="font-size: 16px; margin-bottom: 15px;">Suas Informações</h3>
                            <div class="card" style="padding: 20px; box-shadow: none; border: 1px solid #EEE;">
                                <div style="margin-bottom: 12px; font-size: 14px;"><strong>Próximo Aniversário:</strong> ${c.nascimento ? new Date(c.nascimento).toLocaleDateString('pt-BR', {day:'numeric', month:'long'}) : 'Não informado'}</div>
                                <div style="margin-bottom: 12px; font-size: 14px;"><strong>Instagram:</strong> ${c.insta || '-'}</div>
                                <div style="font-size: 14px;"><strong>Alergias/Observações:</strong><br><span style="color: var(--text-light)">${c.alergias || 'Nenhuma informada.'}</span></div>
                            </div>
                            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="renderPortalCliente(state.clientes.find(cli => cli.id === '${c.id}'), 'agendar')">Agendar Novo Horário</button>
                        ` : ''}

                        ${activeTab === 'agendar' ? `
                            <div style="display: flex; flex-direction: column; gap: 15px;">
                                <h3 style="font-size: 16px;">Novo Agendamento</h3>
                                <div class="form-group">
                                    <label>Escolha o Serviço</label>
                                    <select id="self-srv" class="form-control" onchange="updateAvailableSlots()">
                                        <option value="">Selecione...</option>
                                        ${state.servicos.map(s => `<option value="${s.id}">${s.nome} — R$ ${s.preco.toFixed(2)}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Escolha a Data</label>
                                    <input type="date" id="self-date" class="form-control" min="${new Date().toISOString().split('T')[0]}" onchange="updateAvailableSlots()">
                                </div>
                                <div id="self-slots-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                                    <p style="grid-column: span 3; font-size: 12px; color: #999; text-align: center;">Selecione o serviço e a data acima.</p>
                                </div>
                                <button id="btn-self-confirm" class="btn btn-primary" style="width: 100%; margin-top: 10px; display: none;" onclick="confirmSelfBooking('${c.id}')">Confirmar Horário</button>
                            </div>
                        ` : ''}

                        ${activeTab === 'historico' ? `
                            <div style="display: flex; flex-direction: column; gap: 15px;">
                                ${atendimentos.map(a => {
                                    const s = state.servicos.find(ser => ser.id === a.servicoId);
                                    return `
                                        <div class="card" style="padding: 15px; box-shadow: none; border: 1px solid #EEE;">
                                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                                <div>
                                                    <div style="font-weight: 700; font-size: 15px;">${s ? s.nome : 'Serviço'}</div>
                                                    <div style="font-size: 12px; color: var(--text-light)">${new Date(a.data).toLocaleDateString()}</div>
                                                </div>
                                                <div style="font-weight: 700; color: var(--primary)">+${s ? s.pontos : 0} pts</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('') || '<p style="text-align: center; color: #999;">Ainda não há atendimentos realizados.</p>'}
                            </div>
                        ` : ''}

                        ${activeTab === 'galeria' ? `
                            <div style="display: flex; flex-direction: column; gap: 24px;">
                                ${atendimentos.map(a => {
                                    const s = state.servicos.find(ser => ser.id === a.servicoId);
                                    const fotosAtendimento = a.fotos || [];
                                    if (fotosAtendimento.length === 0) return '';
                                    return `
                                        <div>
                                            <h4 style="font-size: 14px; margin-bottom: 10px; color: var(--text-light)">${new Date(a.data).toLocaleDateString()} — ${s ? s.nome : ''}</h4>
                                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                                ${fotosAtendimento.map(f => `
                                                    <div style="border-radius: 12px; overflow: hidden; height: 150px; border: 1px solid #EEE;">
                                                        <img src="${f}" style="width: 100%; height: 100%; object-fit: cover;">
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('') || '<p style="text-align: center; color: #999;">Suas fotos de evolução aparecerão aqui conforme realizarmos os atendimentos.</p>'}
                            </div>
                        ` : ''}
                    </div>

                    <div style="padding: 20px; text-align: center;">
                        <button class="btn btn-ghost" style="font-size: 12px;" onclick="window.location.hash=''">Sair do Portal</button>
                    </div>
                </div>
            `;
        }

        let selectedSlot = null;
        function updateAvailableSlots() {
            const date = document.getElementById('self-date').value;
            const srvId = document.getElementById('self-srv').value;
            const container = document.getElementById('self-slots-container');
            const btnConfirm = document.getElementById('btn-self-confirm');

            if (!date || !srvId) return;

            const baseSlots = ["08:00", "08:30", "09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30", "17:00", "17:30", "18:00", "18:30"];
            const bookedSlots = state.agendamentos.filter(a => a.data === date && a.status !== 'cancelado').map(a => a.hora);
            
            const freeSlots = baseSlots.filter(s => !bookedSlots.includes(s));

            container.innerHTML = freeSlots.map(s => `
                <div class="slot-btn" onclick="selectSlot(this, '${s}')" style="padding: 10px; border: 1px solid #EEE; border-radius: 10px; text-align: center; font-size: 13px; cursor:pointer; background: white;">${s}</div>
            `).join('') || '<p style="grid-column: span 3; text-align: center; color: var(--danger); font-size: 12px;">Nenhum horário disponível para este dia.</p>';
            
            selectedSlot = null;
            btnConfirm.style.display = 'none';
        }

        function selectSlot(el, slot) {
            document.querySelectorAll('.slot-btn').forEach(b => {
                b.style.background = 'white';
                b.style.color = 'var(--text-main)';
                b.style.borderColor = '#EEE';
            });
            el.style.background = 'var(--primary)';
            el.style.color = 'white';
            el.style.borderColor = 'var(--primary)';
            selectedSlot = slot;
            document.getElementById('btn-self-confirm').style.display = 'block';
        }

        function confirmSelfBooking(cliId) {
            const srvId = document.getElementById('self-srv').value;
            const date = document.getElementById('self-date').value;
            const s = state.servicos.find(ser => ser.id === srvId);

            if (!selectedSlot) return;

            const novo = {
                id: 'a' + Date.now(),
                clienteId: cliId,
                servicoId: srvId,
                hora: selectedSlot,
                data: date,
                status: 'pendente',
                profissionalId: 'p1',
                fotos: []
            };

            state.agendamentos.push(novo);
            save();
            
            alert(`Tudo certo! Seu agendamento de ${s.nome} foi marcado para o dia ${new Date(date).toLocaleDateString()} às ${selectedSlot}.✨`);
            renderPortalCliente(state.clientes.find(cli => cli.id === cliId), 'historico');
        }

        let fichaData = { step: 1, currentClient: null };
        function renderFichaStep(step, client) {
            fichaData.currentClient = client || fichaData.currentClient;
            const container = document.getElementById('client-steps-container');
            if (step === 1) {
                container.innerHTML = `
                    <div class="step-card">
                        <div class="logo" style="justify-content: center; margin-bottom: 20px;">BeautyFlow</div>
                        <div class="step-indicator">
                            <div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div>
                        </div>
                        <h2>Olá, ${fichaData.currentClient.nome.split(' ')[0]}! ✨</h2>
                        <p style="color: var(--text-light); margin-bottom: 24px;">Complete sua ficha para um atendimento personalizado.</p>
                        <div class="form-group" style="text-align: left;">
                            <label>Data de Nascimento</label>
                            <input type="date" id="ficha-nasc" class="form-control" value="${fichaData.currentClient.nascimento || ''}">
                        </div>
                        <div class="form-group" style="text-align: left;">
                            <label>Instagram (@usuario)</label>
                            <input type="text" id="ficha-insta" class="form-control" placeholder="@" value="${fichaData.currentClient.insta || ''}">
                        </div>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 12px;" onclick="saveFichaStep(1)">Continuar</button>
                    </div>
                `;
            } else if (step === 2) {
                container.innerHTML = `
                    <div class="step-card">
                        <div class="step-indicator">
                            <div class="step-dot"></div><div class="step-dot active"></div><div class="step-dot"></div>
                        </div>
                        <h2>Alergias ou Condições?</h2>
                        <p style="color: var(--text-light); margin-bottom: 24px;">Importante para sua segurança.</p>
                        <textarea id="ficha-alergias" class="form-control" rows="4" placeholder="Ex: Alergia a iodo, gestante, pele sensível...">${fichaData.currentClient.alergias || ''}</textarea>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 32px;" onclick="saveFichaStep(2)">Finalizar e Entrar no Portal</button>
                    </div>
                `;
            }
        }

        function saveFichaStep(step) {
            const c = state.clientes.find(cli => cli.id === fichaData.currentClient.id);
            if (step === 1) {
                c.nascimento = document.getElementById('ficha-nasc').value;
                c.insta = document.getElementById('ficha-insta').value;
                renderFichaStep(2);
            } else if (step === 2) {
                c.alergias = document.getElementById('ficha-alergias').value;
                c.fichaCompleta = true;
                save();
                renderPortalCliente(c);
            }
        }

        function selectChoice(el) {
            document.querySelectorAll('.choice-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        // Close sidebar when clicking menu item on mobile
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                if (window.innerWidth <= 992) {
                    document.getElementById('sidebar').classList.remove('active');
                    document.getElementById('sidebar-overlay').style.display = 'none';
                }
            });
        });

        // --- INIT ---
        window.onload = () => {
            initData();
            updateSidebarLogo();
            checkClientRoute();
            if (!window.location.hash.startsWith('#ficha')) {
                showView('dashboard');
            }
        };

        window.onhashchange = () => {
            if (window.location.hash === '') window.location.reload();
            checkClientRoute();
        };

        // Modal close on ESC
        window.onkeydown = (e) => {
            if (e.key === 'Escape') closeModal();
        };
    </script>
</body>
</html>
